<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2733"/>
      <stop offset="50%" stop-color="#06141b"/>
      <stop offset="100%" stop-color="#040d12"/>
    </linearGradient>

    <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C2A072" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C2A072" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowNavy" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a5a6e" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#3a5a6e" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dotGrid" width="46" height="46" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#C2A072" fill-opacity="0.22"/>
    </pattern>

    <filter id="blurLg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="90"/>
    </filter>
    <filter id="blurMd" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- big ambient glows, spread across full canvas so every crop shows depth -->
  <circle cx="260" cy="220" r="340" fill="url(#glowGold)" filter="url(#blurLg)"/>
  <circle cx="1680" cy="200" r="300" fill="url(#glowGold)" filter="url(#blurLg)" opacity="0.85"/>
  <circle cx="960" cy="980" r="380" fill="url(#glowNavy)" filter="url(#blurLg)"/>
  <circle cx="1750" cy="880" r="300" fill="url(#glowNavy)" filter="url(#blurLg)"/>
  <circle cx="120" cy="820" r="260" fill="url(#glowGold)" filter="url(#blurLg)" opacity="0.5"/>

  <!-- dot grid texture across whole canvas -->
  <rect width="1920" height="1080" fill="url(#dotGrid)"/>

  <!-- horizon / perspective lines, tech feel -->
  <g stroke="#C2A072" stroke-width="1" opacity="0.16">
    <line x1="0" y1="1080" x2="960" y2="640"/>
    <line x1="320" y1="1080" x2="960" y2="640"/>
    <line x1="640" y1="1080" x2="960" y2="640"/>
    <line x1="960" y1="1080" x2="960" y2="640"/>
    <line x1="1280" y1="1080" x2="960" y2="640"/>
    <line x1="1600" y1="1080" x2="960" y2="640"/>
    <line x1="1920" y1="1080" x2="960" y2="640"/>
  </g>
  <g stroke="#C2A072" stroke-width="1" opacity="0.1">
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="0" y1="760" x2="1920" y2="760"/>
  </g>

  <!-- circuit traces, symmetric left + right so the whole width reads as designed -->
  <g fill="none" stroke="#C2A072" stroke-width="1.8" stroke-linecap="round" opacity="0.4">
    <path d="M60 120 H220 L260 160 V280 L310 330 H480"/>
    <path d="M480 330 H620"/>
    <path d="M140 380 H300 L340 420 V560 L390 610 H560 L600 650 V800"/>
    <path d="M1860 120 H1700 L1660 160 V280 L1610 330 H1440"/>
    <path d="M1440 330 H1300"/>
    <path d="M1780 380 H1620 L1580 420 V560 L1530 610 H1360 L1320 650 V800"/>
    <path d="M760 940 H1160 L1200 900 V820"/>
  </g>
  <g fill="#C2A072" opacity="0.55">
    <circle cx="220" cy="120" r="5"/>
    <circle cx="260" cy="280" r="5"/>
    <circle cx="480" cy="330" r="5"/>
    <circle cx="300" cy="380" r="5"/>
    <circle cx="390" cy="610" r="5"/>
    <circle cx="600" cy="800" r="5"/>
    <circle cx="1700" cy="120" r="5"/>
    <circle cx="1660" cy="280" r="5"/>
    <circle cx="1440" cy="330" r="5"/>
    <circle cx="1620" cy="380" r="5"/>
    <circle cx="1530" cy="610" r="5"/>
    <circle cx="1320" cy="800" r="5"/>
    <circle cx="760" cy="940" r="4"/>
    <circle cx="1200" cy="820" r="4"/>
  </g>

  <!-- large soft code glyphs, mirrored, well outside the text safe-zone -->
  <text x="40" y="1040" font-family="Consolas, 'Courier New', monospace" font-size="240"
        fill="#C2A072" fill-opacity="0.09" font-weight="700">&lt;/&gt;</text>
  <text x="1480" y="240" font-family="Consolas, 'Courier New', monospace" font-size="240"
        fill="#C2A072" fill-opacity="0.09" font-weight="700">{ }</text>

  <!-- gentle vignette for edge depth -->
  <rect width="1920" height="1080" fill="#06141b" fill-opacity="0.1"/>
</svg>
